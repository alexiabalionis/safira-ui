services:
  mongodb:
    image: mongo:7
    container_name: safira-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: safira
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mongo/seed:/seed:ro
    networks:
      - safira-net

  backend:
    image: balionisalexia/safira-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safira-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/config/env/development.env}
    environment:
      APP_ENV: ${APP_ENV:-development}
      MONGODB_URI: mongodb://mongodb:27017/safira
    ports:
      - "3333:3333"
    networks:
      - safira-net

  frontend:
    image: balionisalexia/safira-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: safira-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ${FRONTEND_ENV_FILE:-./config/env/development.env}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      SAFIRA_API_INTERNAL_URL: ${SAFIRA_API_INTERNAL_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    networks:
      - safira-net

volumes:
  mongodb_data:

networks:
  safira-net:
    driver: bridge
